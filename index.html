<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nambar Information CTH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg-dark: #060918;
            --text-glow: 0 0 10px rgba(0, 210, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animated Background Particles */
        #bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #111d35 0%, #060918 100%);
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(to right, #00d2ff, #91eaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            filter: drop-shadow(var(--text-glow));
        }

        .credit {
            font-size: 0.8rem;
            color: #ffcc00;
            margin-bottom: 25px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
        }

        /* Loading Spinner */
        .loader {
            display: none;
            margin: 20px auto;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Result Section */
        #result {
            margin-top: 25px;
            display: none;
            text-align: left;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .info-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        .info-item {
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 5px;
        }

        .label { color: #94a3b8; font-size: 0.9rem; }
        .val { color: #e2e8f0; font-weight: 500; }

        .telegram-btn {
            display: inline-block;
            margin-top: 20px;
            color: #00d2ff;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .telegram-btn:hover { color: white; text-shadow: var(--text-glow); }

        /* Background Animation Circles */
        .circle {
            position: absolute;
            background: rgba(0, 210, 255, 0.1);
            border-radius: 50%;
            filter: blur(50px);
            z-index: -1;
            animation: float 10s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 100px); }
        }
    </style>
</head>
<body>

    <div id="bg-animation">
        <div class="circle" style="width: 300px; height: 300px; top: -10%; left: -10%;"></div>
        <div class="circle" style="width: 250px; height: 250px; bottom: -5%; right: -5%; background: rgba(58, 123, 213, 0.15);"></div>
    </div>

    <div class="container">
        <h1>Nambar Information</h1>
        <p class="credit">Credit: SHADOW JOKER CTH</p>

        <div class="input-box">
            <input type="text" id="phoneNumber" placeholder="Enter Number (017...)">
        </div>

        <button onclick="fetchInfo()" id="searchBtn">
            <i class="fa-solid fa-magnifying-glass"></i> Search Information
        </button>

        <div class="loader" id="loader"></div>

        <div id="result">
            <div class="info-card">
                <div class="info-item">
                    <span class="label">Name:</span>
                    <span id="resName" class="val"></span>
                </div>
                <div class="info-item">
                    <span class="label">Number:</span>
                    <span id="resNum" class="val"></span>
                </div>
                <div class="info-item">
                    <span class="label">Country:</span>
                    <span id="resCountry" class="val"></span>
                </div>
            </div>
            <pre id="jsonRaw" style="font-size: 10px; color: #4ade80; margin-top: 15px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; overflow-x: auto;"></pre>
        </div>

        <a href="https://t.me/SHADOW_JOKER_CTH" target="_blank" class="telegram-btn">
            <i class="fa-brands fa-telegram"></i> Contact: @SHADOW_JOKER_CTH
        </a>
    </div>

    <script>
        async function fetchInfo() {
            const num = document.getElementById('phoneNumber').value;
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');
            const btn = document.getElementById('searchBtn');

            if (!num) {
                alert("Please enter a phone number!");
                return;
            }

            // Start Loading
            loader.style.display = "block";
            result.style.display = "none";
            btn.disabled = true;
            btn.style.opacity = "0.7";

            try {
                // আপনার api/index.py এর রুটে রিকোয়েস্ট পাঠানো হচ্ছে
                const response = await fetch(`/api/check?number=${num}`);
                const data = await response.json();

                if (data && data.status !== "error") {
                    document.getElementById('resName').innerText = data.name || "Unknown";
                    document.getElementById('resNum').innerText = data.number || num;
                    document.getElementById('resCountry').innerText = data.country || "Bangladesh";
                    document.getElementById('jsonRaw').innerText = JSON.stringify(data, null, 2);
                    
                    result.style.display = "block";
                } else {
                    alert("No information found for this number.");
                }
            } catch (error) {
                console.error(error);
                alert("API Connection Error! Check back-end.");
            } finally {
                loader.style.display = "none";
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
