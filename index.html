<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Number Tracker</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: var(--card); padding: 2rem; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid #334155; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: var(--primary); border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .result { margin-top: 20px; padding: 15px; background: #00000040; border-radius: 8px; display: none; }
        .error { color: #f87171; background: #ef444420; padding: 10px; border-radius: 6px; display: none; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Tracker Pro</h2>
    <input type="text" id="phoneInput" placeholder="Enter number (e.g. 017...)">
    <button onclick="getData()" id="submitBtn">Check Now</button>
    
    <div id="errMsg" class="error"></div>

    <div id="resBox" class="result">
        <p><strong>Name:</strong> <span id="name"></span></p>
        <p><strong>Number:</strong> <span id="num"></span></p>
        <p><strong>Country:</strong> <span id="country"></span></p>
        <pre id="raw" style="font-size: 10px; color: #4ade80; overflow: auto;"></pre>
    </div>
</div>

<script>
    async function getData() {
        const phone = document.getElementById('phoneInput').value;
        const btn = document.getElementById('submitBtn');
        const resBox = document.getElementById('resBox');
        const errMsg = document.getElementById('errMsg');

        if (!phone) return alert("Number is required!");

        // UI Reset
        btn.disabled = true;
        btn.innerText = "Processing...";
        resBox.style.display = "none";
        errMsg.style.display = "none";

        try {
            // আপনার নিজস্ব এপিআই রুট ব্যবহার করুন (যদি Vercel-এ থাকে)
            // সরাসরি এপিআই কল করতে চাইলে প্রক্সি ব্যবহার আবশ্যক
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://sbsakib.eu.cc/apis/truecaller?key=Test&number1=${phone}`)}`);
            
            if (!response.ok) throw new Error("Network issue");
            
            const wrapper = await response.json();
            const data = JSON.parse(wrapper.contents);

            if (data && data.status !== "error") {
                document.getElementById('name').innerText = data.name || "N/A";
                document.getElementById('num').innerText = data.number || phone;
                document.getElementById('country').innerText = data.country || "BD";
                document.getElementById('raw').innerText = JSON.stringify(data, null, 2);
                resBox.style.display = "block";
            } else {
                errMsg.innerText = "Error: Invalid Response from API";
                errMsg.style.display = "block";
            }
        } catch (err) {
            errMsg.innerText = "CORS Error or Connection Timeout!";
            errMsg.style.display = "block";
            console.error(err);
        } finally {
            btn.disabled = false;
            btn.innerText = "Check Now";
        }
    }
</script>

</body>
</html>
