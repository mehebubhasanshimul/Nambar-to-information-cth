<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nambar Information CTH | SHADOW JOKER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg-dark: #060918;
            --card-bg: rgba(255, 255, 255, 0.07);
            --glow: 0 0 15px rgba(0, 210, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Live Background Animation */
        #bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #111d35 0%, #060918 100%);
        }

        .floating-circle {
            position: absolute;
            background: rgba(0, 210, 255, 0.1);
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            animation: float 15s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 120px) scale(1.2); }
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 30px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            text-align: center;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(to right, #00d2ff, #91eaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .credit {
            font-size: 0.8rem;
            color: #ffcc00;
            font-weight: bold;
            margin-bottom: 25px;
            display: block;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #2d3748;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: var(--glow);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { transform: translateY(-2px); box-shadow: var(--glow); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Loader Animation */
        .loader {
            display: none;
            margin: 20px auto;
            border: 3px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            width: 35px; height: 35px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Info Display Card */
        #result {
            display: none;
            margin-top: 25px;
            text-align: left;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn { from { opacity: 0; scale: 0.9; } to { opacity: 1; scale: 1; } }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 18px;
            border-left: 5px solid var(--primary);
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .label { color: #94a3b8; font-size: 0.85rem; }
        .val { color: #fff; font-weight: 500; text-align: right; }
        .val.name { color: #00ffcc; font-weight: bold; }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .social-icons a {
            font-size: 1.5rem;
            transition: 0.3s;
        }

        .social-icons a:hover { transform: scale(1.2); }

        .telegram-link {
            display: block;
            margin-top: 25px;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .telegram-link:hover { opacity: 1; text-decoration: underline; }

        details {
            margin-top: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 5px;
        }
        summary { font-size: 0.7rem; color: #4a5568; cursor: pointer; }
        pre { font-size: 9px; color: #4ade80; overflow-x: auto; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="bg-animation">
        <div class="floating-circle" style="width: 300px; height: 300px; top: -10%; left: -10%;"></div>
        <div class="floating-circle" style="width: 200px; height: 200px; bottom: 10%; right: 5%; background: rgba(58, 123, 213, 0.2);"></div>
    </div>

    <div class="container">
        <h1>Nambar Information</h1>
        <span class="credit">Credit: SHADOW JOKER CTH</span>

        <div class="input-group">
            <input type="text" id="phoneInput" placeholder="Enter Number (017...)">
        </div>

        <button onclick="searchNumber()" id="btnMain">
            <i class="fa-solid fa-bolt"></i> Get Information
        </button>

        <div class="loader" id="loader"></div>

        <div id="result">
            <div class="info-box">
                <div class="row">
                    <span class="label">Name:</span>
                    <span id="resName" class="val name"></span>
                </div>
                <div class="row">
                    <span class="label">Carrier:</span>
                    <span id="resCarrier" class="val"></span>
                </div>
                <div class="row">
                    <span class="label">Number:</span>
                    <span id="resNum" class="val"></span>
                </div>
                <div class="row">
                    <span class="label">Location:</span>
                    <span id="resLocation" class="val"></span>
                </div>

                <div class="social-icons">
                    <a id="waLink" href="#" target="_blank" style="color: #25d366;"><i class="fa-brands fa-whatsapp"></i></a>
                    <a id="tgLink" href="#" target="_blank" style="color: #24A1DE;"><i class="fa-brands fa-telegram"></i></a>
                </div>
            </div>

            <details>
                <summary>View Raw JSON</summary>
                <pre id="jsonOut"></pre>
            </details>
        </div>

        <a href="https://t.me/SHADOW_JOKER_CTH" target="_blank" class="telegram-link">
            <i class="fa-brands fa-telegram"></i> @SHADOW_JOKER_CTH
        </a>
    </div>

    <script>
        async function searchNumber() {
            const input = document.getElementById('phoneInput').value;
            const btn = document.getElementById('btnMain');
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('result');

            if (!input) return alert("দয়া করে একটি নাম্বার দিন!");

            // UI State Change
            loader.style.display = "block";
            resultDiv.style.display = "none";
            btn.disabled = true;

            try {
                // আপনার index.py এপিআই রুটে কল করা হচ্ছে
                const response = await fetch(`/api/check?number=${input}`);
                const data = await response.json();

                if (data && data.ok === true && data.results) {
                    const info = data.results;
                    
                    // ডেটা পপুলেট করা
                    document.getElementById('resName').innerText = info.name || "Unknown";
                    document.getElementById('resCarrier').innerText = info.carrier || "N/A";
                    document.getElementById('resNum').innerText = info.number || input;
                    document.getElementById('resLocation').innerText = info.location || "Bangladesh";
                    
                    // সোশ্যাল লিঙ্ক হ্যান্ডেল করা
                    if(info.social) {
                        document.getElementById('waLink').href = info.social.whatsapp || "#";
                        document.getElementById('tgLink').href = info.social.telegram || "#";
                    }

                    document.getElementById('jsonOut').innerText = JSON.stringify(data, null, 2);
                    resultDiv.style.display = "block";
                } else {
                    alert("কোনো তথ্য পাওয়া যায়নি!");
                }
            } catch (err) {
                alert("সার্ভার এরর! আবার চেষ্টা করুন।");
                console.error(err);
            } finally {
                loader.style.display = "none";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
