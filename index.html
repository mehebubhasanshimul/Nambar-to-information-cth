<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nambar Information CTH</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Arial', sans-serif;
            background: url('https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJidm96eGZpbmRzZWp5Z3Z5eGZxeGZxeGZxeGZxeGZxeGZxeCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7TKMGpxP6tL94Y64/giphy.gif') no-repeat center center fixed;
            background-size: cover;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .card {
            background: rgba(0, 0, 0, 0.85);
            padding: 30px; border-radius: 20px;
            box-shadow: 0 0 25px #0084ff;
            width: 90%; max-width: 400px; text-align: center;
            border: 1px solid rgba(0, 132, 255, 0.4);
        }

        h1 {
            color: #fff; font-size: 24px;
            text-shadow: 0 0 10px #0084ff, 0 0 20px #0084ff;
            margin-bottom: 20px;
        }

        .credit {
            margin-top: 15px; color: #ff00ff;
            font-weight: bold; text-shadow: 0 0 8px #ff00ff;
            font-size: 14px;
        }

        input {
            width: 85%; padding: 12px; margin-bottom: 15px;
            border-radius: 8px; border: 1px solid #0084ff;
            background: transparent; color: #fff; text-align: center;
        }

        button {
            width: 90%; background: #0084ff; color: #fff;
            border: none; padding: 12px; border-radius: 8px;
            font-weight: bold; cursor: pointer; box-shadow: 0 0 10px #0084ff;
        }

        #result {
            margin-top: 20px; padding: 10px; background: rgba(255,255,255,0.1);
            border-radius: 8px; display: none; text-align: left; font-size: 14px;
            border-left: 4px solid #0084ff; color: #fff;
        }

        /* Pop-up */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9; }
        #popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 25px; border-radius: 15px; border: 2px solid #0084ff; text-align: center; z-index: 10; width: 80%; max-width: 300px; color: #fff; }
        .join-btn { display: inline-block; margin-top: 15px; padding: 10px 20px; background: #229ED9; color: #fff; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div id="overlay"></div>
<div id="popup">
    <h3>Join Our Channel</h3>
    <p>সব আপডেট পেতে টেলিগ্রামে জয়েন হোন।</p>
    <a href="https://t.me/CyberTeamHelp" class="join-btn" target="_blank">JOIN NOW</a>
    <br><br>
    <button onclick="closePopup()" style="background:none; box-shadow:none; border:1px solid #444; font-size: 12px;">Close</button>
</div>

<div class="card">
    <h1>Nambar Information CTH</h1>
    <input type="text" id="phone" placeholder="নম্বর দিন (যেমন: 017...)">
    <button onclick="search()">SEARCH NOW</button>
    <div id="result"></div>
    <div class="credit">CREDIT: SHADOW JOKER</div>
</div>

<script>
    setTimeout(() => {
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('popup').style.display = 'block';
    }, 5000);

    function closePopup() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('popup').style.display = 'none';
    }

    async function search() {
        const num = document.getElementById('phone').value;
        const resBox = document.getElementById('result');
        if(!num) return alert("নম্বর দিন!");

        resBox.style.display = "block";
        resBox.innerHTML = "খোঁজা হচ্ছে...";

        try {
            const response = await fetch(`/api/search?number=${num}`);
            const data = await response.json();
            
            // এপিআই রেসপন্স অনুযায়ী ডেটা দেখানো (data2 এপিআই এর ফরম্যাট অনুযায়ী)
            if(data && data.name) {
                resBox.innerHTML = `
                    <b>নাম:</b> ${data.name}<br>
                    <b>সিম:</b> ${data.carrier || 'N/A'}<br>
                    <b>ইমেইল:</b> ${data.email || 'নেই'}
                `;
            } else {
                resBox.innerHTML = "কোনো তথ্য পাওয়া যায়নি!";
            }
        } catch (e) {
            resBox.innerHTML = "সার্ভার এরর!";
        }
    }
</script>

</body>
</html>
